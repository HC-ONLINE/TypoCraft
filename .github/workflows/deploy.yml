name: Deploy TypoCraft to GitHub Pages

on:
  # Trigger on every push to main
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions needed to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; skip runs queued between
# the in-progress run and the latest queued run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Astro
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Astro outputs to ./dist by default
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
